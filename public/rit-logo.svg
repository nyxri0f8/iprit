<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 300" width="1024" height="300">
  <!-- RIT Logo Tree Circle -->
  <circle cx="140" cy="140" r="100" fill="#2B5F8F"/>
  <circle cx="140" cy="140" r="90" fill="#3A7AB8"/>
  
  <!-- Tree with circuit pattern -->
  <g transform="translate(140, 140)">
    <!-- Trunk -->
    <rect x="-8" y="30" width="16" height="40" fill="#E8F4F8" rx="2"/>
    
    <!-- Branches -->
    <line x1="0" y1="20" x2="-30" y2="-10" stroke="#E8F4F8" stroke-width="3"/>
    <line x1="0" y1="20" x2="30" y2="-10" stroke="#E8F4F8" stroke-width="3"/>
    <line x1="0" y1="0" x2="-40" y2="-30" stroke="#E8F4F8" stroke-width="3"/>
    <line x1="0" y1="0" x2="40" y2="-30" stroke="#E8F4F8" stroke-width="3"/>
    <line x1="0" y1="-20" x2="-25" y2="-50" stroke="#E8F4F8" stroke-width="3"/>
    <line x1="0" y1="-20" x2="25" y2="-50" stroke="#E8F4F8" stroke-width="3"/>
    
    <!-- Circuit nodes -->
    <circle cx="-30" cy="-10" r="6" fill="#FF8A65"/>
    <circle cx="30" cy="-10" r="6" fill="#FF8A65"/>
    <circle cx="-40" cy="-30" r="6" fill="#FF8A65"/>
    <circle cx="40" cy="-30" r="6" fill="#FF8A65"/>
    <circle cx="-25" cy="-50" r="6" fill="#FF8A65"/>
    <circle cx="25" cy="-50" r="6" fill="#FF8A65"/>
    <circle cx="0" cy="-60" r="6" fill="#FF8A65"/>
    
    <!-- Additional nodes -->
    <circle cx="-50" cy="10" r="5" fill="#64B5F6"/>
    <circle cx="50" cy="10" r="5" fill="#64B5F6"/>
    <circle cx="-55" cy="-20" r="5" fill="#64B5F6"/>
    <circle cx="55" cy="-20" r="5" fill="#64B5F6"/>
  </g>
  
  <!-- RIT Text -->
  <text x="280" y="140" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#2C2C2C">rit</text>
  <rect x="480" y="50" width="4" height="120" fill="#FF8A65"/>
  
  <!-- Rajalakshmi Institute of Technology -->
  <text x="520" y="90" font-family="Arial, sans-serif" font-size="32" font-weight="300" fill="#555555">RAJALAKSHMI</text>
  <text x="520" y="125" font-family="Arial, sans-serif" font-size="32" font-weight="300" fill="#555555">INSTITUTE OF</text>
  <text x="520" y="160" font-family="Arial, sans-serif" font-size="32" font-weight="300" fill="#555555">TECHNOLOGY</text>
  
  <!-- IPR Badge -->
  <rect x="280" y="180" width="80" height="35" rx="17.5" fill="#FF8A65"/>
  <text x="320" y="205" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">IPR</text>
  
  <!-- Tagline -->
  <text x="40" y="260" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#666666">BELIEVE IN THE POSSIBILITIES</text>
</svg>
